<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Maker</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #eee;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.5rem;
      background: #2a2a2a;
      padding: 0.75rem 1rem;
      border-radius: 6px;
    }

    .toolbar label {
      font-size: 0.9rem;
      color: #aaa;
    }

    input[type="text"] {
      padding: 0.4rem 0.6rem;
      background: #444;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 200px;
    }

    button {
      padding: 0.4rem 0.9rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }

    button:hover {
      opacity: 0.85;
    }

    .btn-primary { background: #4a9; color: #fff; }
    .btn-danger  { background: #c44; color: #fff; }
    .btn-secondary { background: #555; color: #eee; }

    #dropzone {
      border: 2px dashed #555;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      color: #777;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s, background 0.2s;
    }

    #dropzone.dragover {
      border-color: #4a9;
      background: #223322;
      color: #ccc;
    }

    #dropzone p { margin-bottom: 0.5rem; font-size: 1rem; }
    #dropzone span { font-size: 0.8rem; color: #555; }

    #file-input { display: none; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .gallery-item {
      position: relative;
      background: #2a2a2a;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .gallery-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .gallery-item .caption {
      padding: 0.4rem 0.5rem;
      font-size: 0.78rem;
      color: #ccc;
      background: #222;
      word-break: break-word;
    }

    .gallery-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .gallery-item .remove-btn:hover {
      background: #c44;
    }

    #empty-msg {
      color: #555;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <h1>🖼️ Gallery Maker</h1>

  <div class="toolbar">
    <label for="title-input">Title:</label>
    <input type="text" id="title-input" placeholder="My Gallery" />
    <button class="btn-primary" onclick="document.getElementById('file-input').click()">+ Add Images</button>
    <button class="btn-danger" onclick="clearGallery()">Clear All</button>
    <button class="btn-secondary" onclick="exportGallery()">Export HTML</button>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
  </div>

  <div id="dropzone"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event)"
    onclick="document.getElementById('file-input').click()">
    <p>Drag &amp; drop images here</p>
    <span>or click to browse files</span>
  </div>

  <div class="gallery" id="gallery"></div>
  <p id="empty-msg">No images added yet.</p>

  <script>
    const gallery = document.getElementById('gallery');
    const emptyMsg = document.getElementById('empty-msg');
    let items = [];

    function updateEmptyMsg() {
      emptyMsg.style.display = items.length === 0 ? 'block' : 'none';
    }

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => addItem(e.target.result, file.name);
        reader.readAsDataURL(file);
      });
    }

    function addItem(src, name) {
      const id = Date.now() + Math.random();
      items.push({ id, src, name });
      renderItem({ id, src, name });
      updateEmptyMsg();
    }

    function renderItem({ id, src, name }) {
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.dataset.id = id;

      const img = document.createElement('img');
      img.src = src;
      img.alt = name;

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.textContent = name;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.title = 'Remove';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => removeItem(id, div);

      div.appendChild(img);
      div.appendChild(caption);
      div.appendChild(removeBtn);
      gallery.appendChild(div);
    }

    function removeItem(id, el) {
      items = items.filter(i => i.id !== id);
      el.remove();
      updateEmptyMsg();
    }

    function clearGallery() {
      if (items.length === 0) return;
      if (!confirm('Remove all images?')) return;
      items = [];
      gallery.innerHTML = '';
      updateEmptyMsg();
    }

    function exportGallery() {
      const title = document.getElementById('title-input').value.trim() || 'My Gallery';
      const cards = items.map(({ src, name }) => `
        <div class="gallery-item">
          <img src="${src}" alt="${escapeHtml(name)}" />
          <div class="caption">${escapeHtml(name)}</div>
        </div>`).join('\n');

      const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${escapeHtml(title)}</title>
  <style>
    body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 1.5rem; }
    h1 { margin-bottom: 1rem; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .gallery-item { background: #2a2a2a; border-radius: 6px; overflow: hidden; }
    .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .caption { padding: 0.4rem 0.5rem; font-size: 0.78rem; color: #ccc; background: #222; }
  </style>
</head>
<body>
  <h1>${escapeHtml(title)}</h1>
  <div class="gallery">
${cards}
  </div>
</body>
</html>`;

      const blob = new Blob([html], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'gallery.html';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('dragover');
    }

    function onDragLeave(e) {
      e.currentTarget.classList.remove('dragover');
    }

    function onDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    }

    updateEmptyMsg();
  </script>
</body>
</html>
