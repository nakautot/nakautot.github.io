<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #58a6ff;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .controls input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 9px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .controls input[type="text"]:focus { border-color: #58a6ff; }

    .controls input[type="number"] {
      width: 100px;
      padding: 9px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .controls input[type="number"]:focus { border-color: #58a6ff; }

    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #8b949e;
      white-space: nowrap;
    }

    #loadBtn {
      padding: 9px 20px;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #loadBtn:hover { background: #2ea043; }
    #loadBtn:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }

    #status {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 16px;
      min-height: 18px;
    }
    #status.error { color: #f85149; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .thumb-card {
      position: relative;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      transition: border-color 0.15s, transform 0.15s;
    }
    .thumb-card:hover { border-color: #58a6ff; transform: scale(1.03); }

    .thumb-card img,
    .thumb-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-card .badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    .thumb-card .num-label {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.65);
      color: #c9d1d9;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
      max-width: calc(100% - 12px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    #modal.open { display: flex; }

    #modal-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #c9d1d9;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      z-index: 10000;
    }
    #modal-close:hover { color: #fff; }

    #modal-media {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      display: block;
    }

    #modal-url {
      font-size: 12px;
      color: #8b949e;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #url-list-section {
      margin-bottom: 16px;
    }
    #url-list-section h2 {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .url-list-item {
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #21262d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url-list-item a {
      color: #58a6ff;
      text-decoration: none;
    }
    .url-list-item a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>🖼 Gallery Explorer</h1>

  <div class="controls">
    <input type="text" id="urlInput" placeholder="Paste an image or video URL here…" autocomplete="off" spellcheck="false">
    <label>
      Max failures
      <input type="number" id="maxFail" value="5" min="1" max="100">
    </label>
    <button id="loadBtn">Load</button>
  </div>

  <div id="status"></div>
  <div id="url-list-section" hidden>
    <h2>Unknown-type URLs</h2>
    <div id="url-list"></div>
  </div>
  <div class="grid" id="grid"></div>

  <!-- Modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <button id="modal-close" aria-label="Close">&#x2715;</button>
    <div id="modal-media-wrap"></div>
    <div id="modal-url"></div>
  </div>

  <script>
    const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','avif','tiff','tif','ico','svg','jfif','heic','heif']);
    const VIDEO_EXTS = new Set(['mp4','webm','ogg','ogv','mov','avi','mkv','m4v','3gp','flv','ts','mts']);

    const urlInput  = document.getElementById('urlInput');
    const maxFailEl = document.getElementById('maxFail');
    const loadBtn   = document.getElementById('loadBtn');
    const grid      = document.getElementById('grid');
    const status    = document.getElementById('status');
    const urlListSection = document.getElementById('url-list-section');
    const urlList   = document.getElementById('url-list');
    const modal     = document.getElementById('modal');
    const modalWrap = document.getElementById('modal-media-wrap');
    const modalUrl  = document.getElementById('modal-url');
    const modalClose = document.getElementById('modal-close');

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function extFromUrl(url) {
      try {
        const path = new URL(url).pathname;
        const base = path.split('/').pop() || '';
        const dot  = base.lastIndexOf('.');
        return dot >= 0 ? base.slice(dot + 1).toLowerCase() : '';
      } catch { return ''; }
    }

    function typeFromExt(url) {
      const ext = extFromUrl(url);
      if (IMAGE_EXTS.has(ext)) return 'image';
      if (VIDEO_EXTS.has(ext)) return 'video';
      return null;
    }

    // Try to detect media type by loading in a hidden element.
    function probeMedia(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => resolve('image');
        img.onerror = () => {
          const vid = document.createElement('video');
          vid.preload = 'metadata';
          vid.onloadedmetadata = () => resolve('video');
          vid.onerror = () => resolve(null);
          vid.src = url;
        };
        img.src = url;
      });
    }

    // Try to detect media type via HTTP HEAD + Content-Type header.
    // Works for same-origin and CORS-enabled servers; throws (caught) otherwise.
    // Returns 'image', 'video', 'unknown' (data returned but type unrecognised), or null (error/no data).
    async function detectTypeByFetch(url) {
      try {
        const resp = await fetch(url, { method: 'HEAD' });
        if (!resp.ok) return null;
        const ct = (resp.headers.get('content-type') || '').split(';')[0].trim();
        if (ct.startsWith('image/')) return 'image';
        if (ct.startsWith('video/')) return 'video';
        // Response was OK but content-type isn't a recognised media type.
        return 'unknown';
      } catch {
        return null;
      }
    }

    async function detectType(url) {
      const t = typeFromExt(url);
      if (t) return t;
      // For extension-less URLs (e.g. /attachments/123/) use Content-Type from HEAD.
      // Falls back to loading in a hidden element when CORS or network prevents fetch.
      const ft = await detectTypeByFetch(url);
      if (ft === 'unknown') return 'unknown'; // URL returns data but type is unrecognised — propagate immediately
      if (ft) return ft;
      return await probeMedia(url);
    }

    // Parse the last numeric run in the URL path (before query/hash).
    function parseUrlParts(url) {
      try {
        const u        = new URL(url);
        const fullPath = u.pathname;
        const matches  = [...fullPath.matchAll(/\d+/g)];
        if (!matches.length) return null;

        const last = matches[matches.length - 1];
        return {
          before:    url.slice(0, url.indexOf(u.pathname)) + fullPath.slice(0, last.index),
          number:    parseInt(last[0], 10),
          padLength: last[0].length,
          after:     fullPath.slice(last.index + last[0].length) + u.search + u.hash,
        };
      } catch { return null; }
    }

    function buildUrl(parts, n) {
      if (n < 0) return null;
      const s = String(n);
      const padded = s.length >= parts.padLength ? s : s.padStart(parts.padLength, '0');
      return parts.before + padded + parts.after;
    }

    // ─── Thumbnail rendering ──────────────────────────────────────────────────

    const MAX_ITEMS = 10;

    function createThumbCard(url, type, numberLabel) {
      const card = document.createElement('div');
      card.className = 'thumb-card';
      card.dataset.url  = url;
      card.dataset.type = type;

      const media = type === 'image' ? document.createElement('img') : document.createElement('video');
      if (type === 'video') {
        media.muted   = true;
        media.preload = 'metadata';
        media.loop    = true;
        media.addEventListener('mouseenter', () => media.play());
        media.addEventListener('mouseleave', () => media.pause());
      }
      media.src = url;

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = type === 'video' ? '▶ video' : '🖼 img';

      const label = document.createElement('span');
      label.className = 'num-label';
      label.textContent = numberLabel !== undefined ? `#${numberLabel}` : '';

      card.appendChild(media);
      card.appendChild(label);
      card.appendChild(badge);

      card.addEventListener('click', () => openModal(url, type));
      return card;
    }

    function addThumb(url, type, numberLabel) {
      grid.appendChild(createThumbCard(url, type, numberLabel));
    }

    function insertThumbBefore(refCard, url, type, numberLabel) {
      grid.insertBefore(createThumbCard(url, type, numberLabel), refCard);
    }

    function addUrlToList(url) {
      urlListSection.hidden = false;
      const item = document.createElement('div');
      item.className = 'url-list-item';
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = url;
      item.appendChild(a);
      urlList.appendChild(item);
    }

    // ─── Modal ────────────────────────────────────────────────────────────────

    function openModal(url, type) {
      modalWrap.innerHTML = '';
      const media = type === 'image' ? document.createElement('img') : document.createElement('video');
      media.id = 'modal-media';
      if (type === 'video') {
        media.controls = true;
        media.autoplay  = true;
      }
      media.src = url;
      modalWrap.appendChild(media);
      modalUrl.textContent = url;
      modal.classList.add('open');
    }

    function closeModal() {
      modal.classList.remove('open');
      modalWrap.innerHTML = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─── Main scan logic ──────────────────────────────────────────────────────

    let scanning = false;
    let abortScan = false;

    loadBtn.addEventListener('click', async () => {
      if (scanning) {
        abortScan = true;
        return;
      }

      const rawUrl    = urlInput.value.trim();
      const maxFail   = Math.max(1, parseInt(maxFailEl.value) || 5);

      if (!rawUrl) {
        setStatus('Please enter a URL.', true);
        return;
      }

      // Reset
      grid.innerHTML = '';
      urlList.innerHTML = '';
      urlListSection.hidden = true;
      abortScan      = false;
      scanning       = true;
      loadBtn.textContent = 'Stop';
      loadBtn.style.background = '#da3633';
      loadBtn.style.borderColor = '#f85149';

      const parts = parseUrlParts(rawUrl);

      setStatus('<span class="spinner"></span>Checking URL…');

      const initialType = await detectType(rawUrl);

      if (abortScan) { finish(0); return; }

      if (!parts) {
        // No number in URL — just check the single URL
        if (initialType === 'unknown') {
          addUrlToList(rawUrl);
          setStatus('Type could not be determined — URL listed below.');
        } else if (initialType) {
          addThumb(rawUrl, initialType);
          setStatus(`Found 1 item.`);
        } else {
          setStatus('URL does not point to a recognised image or video file.', true);
        }
        finish(initialType ? 1 : 0);
        return;
      }

      let found = 0;

      // ── Backward scan (decrement) ─────────────────────────────────────────
      // Collect backward items first (we prepend to grid so order stays ascending)
      const backItems = []; // [{url, type, num}]
      {
        let failures = 0;
        let n = parts.number - 1;
        while (found + backItems.length < MAX_ITEMS && failures < maxFail && n >= 0 && !abortScan) {
          const u = buildUrl(parts, n);
          if (!u) break;
          setStatus(`<span class="spinner"></span>Scanning… found ${found + backItems.length} &nbsp;(trying #${n})`);
          const t = await detectType(u);
          if (t === 'unknown') {
            addUrlToList(u);
            failures = 0;
          } else if (t) {
            backItems.unshift({ url: u, type: t, num: n });
            failures = 0;
          } else {
            failures++;
          }
          n--;
        }
      }

      if (abortScan) { finish(found + backItems.length); return; }

      // Render backward items in ascending order (they end up before the initial card)
      const anchorCard = grid.firstChild; // null initially
      for (const item of backItems) {
        if (anchorCard) insertThumbBefore(anchorCard, item.url, item.type, item.num);
        else addThumb(item.url, item.type, item.num);
      }
      found += backItems.length;

      // Render initial URL (if valid)
      if (initialType === 'unknown') {
        addUrlToList(rawUrl);
      } else if (initialType) {
        addThumb(rawUrl, initialType, parts.number);
        found++;
      }

      // ── Forward scan (increment) ──────────────────────────────────────────
      {
        let failures = 0;
        let n = parts.number + 1;
        while (found < MAX_ITEMS && failures < maxFail && !abortScan) {
          const u = buildUrl(parts, n);
          if (!u) break;
          setStatus(`<span class="spinner"></span>Scanning… found ${found} &nbsp;(trying #${n})`);
          const t = await detectType(u);
          if (t === 'unknown') {
            addUrlToList(u);
            failures = 0;
          } else if (t) {
            addThumb(u, t, n);
            found++;
            failures = 0;
          } else {
            failures++;
          }
          n++;
        }
      }

      if (!initialType && found === 0) {
        setStatus('No images or videos found around that URL.', true);
      } else {
        setStatus(`Done — found ${found} item${found !== 1 ? 's' : ''}.`);
      }

      finish(found);
    });

    function finish(count) {
      scanning = false;
      abortScan = false;
      loadBtn.textContent = 'Load';
      loadBtn.style.background = '';
      loadBtn.style.borderColor = '';
    }

    function setStatus(html, isError = false) {
      status.innerHTML = html;
      status.className = isError ? 'error' : '';
    }
  </script>
</body>
</html>
